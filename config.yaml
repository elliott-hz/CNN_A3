# Global Configuration for Visual Dog Emotion Recognition Project

# Paths
paths:
  data_root: "data"
  raw_data: "data/raw"
  processed_data: "data/processed"
  outputs: "outputs"
  
# Dataset configurations
datasets:
  detection:
    name: "dog_face_detection"
    kaggle_dataset: "jessicali9530/dog-face-detection"
    image_size: 640
    train_ratio: 0.7
    val_ratio: 0.2
    test_ratio: 0.1
    
  emotion:
    name: "dog_emotion"
    kaggle_dataset: "tongpython/dog-emotions-5-classes"
    image_size: 224
    classes: ["angry", "happy", "relax", "frown", "alert"]
    train_ratio: 0.7
    val_ratio: 0.2
    test_ratio: 0.1

# Model default configurations
models:
  detection:
    backbone: "m"  # n, s, m, l, x
    input_size: 640
    confidence_threshold: 0.5
    nms_iou_threshold: 0.45
    pretrained: true
    
  classification:
    model_name: "resnet50"
    dropout_rate: 0.5
    num_classes: 5
    pretrained: true
    freeze_backbone: true
    freeze_epochs: 10

# Training default configurations
training:
  detection:
    learning_rate: 0.001
    batch_size: 16
    epochs: 50
    optimizer: "adam"  # sgd, adam, adamw
    weight_decay: 0.0001
    early_stopping_patience: 10
    use_amp: true
    gradient_accumulation_steps: 1
    warmup_epochs: 5
    scheduler: "cosine"  # cosine, step, reduce_on_plateau
    
  classification:
    learning_rate: 0.001
    batch_size: 32
    epochs: 30
    optimizer: "adam"
    weight_decay: 0.0001
    early_stopping_patience: 7
    use_amp: true
    gradient_accumulation_steps: 1
    label_smoothing: 0.1
    class_weighting: true

# Evaluation configurations
evaluation:
  detection:
    iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
    confidence_threshold: 0.5
    
  classification:
    metrics: ["accuracy", "precision", "recall", "f1"]

# Hardware configurations
hardware:
  device: "cuda"  # cuda, cpu
  num_workers: 4
  pin_memory: true
